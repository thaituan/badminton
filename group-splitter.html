<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chia bảng nhóm cầu lông: Lên trình thì đổi tên</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f2f7fb;
            --surface: rgba(255,255,255,0.78);
            --surface-strong: rgba(255,255,255,0.96);
            --text: #111827;
            --muted: #475569;
            --border: rgba(148,163,184,0.24);
            --brand: #2563eb;
            --brand-2: #ef4444;
            --shadow: 0 24px 60px rgba(15,23,42,0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background-color: #d9e8f0;
            background-image: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.35)), url('background-small.jpg');
            background-position: center bottom;
            background-size: cover;
            background-attachment: fixed;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255,255,255,0.25), transparent 35%), radial-gradient(circle at bottom right, rgba(96,165,250,0.12), transparent 28%);
            pointer-events: none;
            z-index: 0;
        }

        html, body { height: 100%; }

        body > * { position: relative; z-index: 1; }

        h1, h2 { margin-bottom: 10px; line-height: 1.15; }
        h1 { font-size: clamp(2rem, 2.7vw, 3.2rem); letter-spacing: -0.04em; }

        .card {
            background: rgba(255,255,255,0.56);
            border: 1px solid rgba(148,163,184,0.18);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 28px;
            margin: 24px auto;
            max-width: 1100px;
            backdrop-filter: blur(14px);
        }

        label { display: inline-block; margin-bottom: 6px; font-weight: 700; color: var(--muted); }

        input[type=text], select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(148,163,184,0.35);
            border-radius: 16px;
            background: rgba(255,255,255,0.9);
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type=text]:focus, select:focus {
            outline: none;
            border-color: rgba(37,99,235,0.45);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            background: linear-gradient(135deg, var(--brand), #1d4ed8);
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            min-height: 52px;
            box-shadow: 0 14px 28px rgba(37,99,235,0.18);
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.97;
        }

        button.secondary {
            background: #475569;
            box-shadow: 0 12px 24px rgba(71,85,105,0.18);
        }

        button#splitBtn {
            width: 100%;
            max-width: 220px;
            margin-top: 18px;
        }

        .flex-row { display:flex; gap:14px; flex-wrap:wrap; margin-bottom: 18px; }
        .flex-row > * { flex: 1; min-width: 160px; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 14px;
            margin-top: 24px;
            table-layout: fixed;
        }

        th, td {
            padding: 14px 16px;
            background: rgba(255,255,255,0.92);
            color: var(--text);
            vertical-align: middle;
        }

        th {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.85rem;
            color: #475569;
            border-bottom: 1px solid rgba(148,163,184,0.18);
        }

        td {
            border: none;
            border-radius: 18px;
        }

        tr td:first-child { width: 45%; }
        tr td:nth-child(2), tr td:nth-child(3) { width: 20%; }
        tr td:last-child { width: 15%; }

        tr:hover td { transform: translateX(2px); }

        .hero { display:flex; justify-content:center; margin-bottom: 24px; }
        .hero svg { width: 120px; height: 80px; }

        .result-grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }

        .result-card {
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.70);
            border: 1px solid rgba(148,163,184,0.22);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 22px 48px rgba(15,23,42,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 28px 60px rgba(15,23,42,0.12);
        }

        .result-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 30%);
        }

        .result-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.38) 100%);
            pointer-events: none;
        }

        .result-card.team-a { border-color: rgba(37,99,235,0.35); }
        .result-card.team-b { border-color: rgba(239,68,68,0.35); }

        .result-card h3 {
            position: relative;
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.4rem;
            letter-spacing: -0.03em;
            z-index: 1;
        }

        .result-card.team-a h3 { color: #1d4ed8; }
        .result-card.team-b h3 { color: #b91c1c; }

        .result-card h3::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 64px;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(37,99,235,0.95), rgba(59,130,246,0.75));
        }

        .result-card.team-b h3::after {
            background: linear-gradient(90deg, rgba(239,68,68,0.95), rgba(190,18,60,0.75));
        }

        .result-card ul { list-style: none; padding: 0; margin: 0; position: relative; z-index: 1; }
        .result-card li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 16px;
            background: #ffffff;
            border: 1px solid rgba(148,163,184,0.16);
            color: #0f172a;
        }

        .result-card li:last-child { margin-bottom: 0; }

        .badge {
            display: inline-flex;
            align-items:center;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(148,163,184,0.18);
            font-size: 0.8rem;
            color: #334155;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .team-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 16px;
            width: fit-content;
        }

        .team-pill.team-a { background: rgba(59,130,246,0.14); color: #1d4ed8; }
        .team-pill.team-b { background: rgba(239,68,68,0.14); color: #b91c1c; }

        .summary {
            margin-top: 18px;
            background: rgba(255,255,255,0.96);
            border: 1px solid rgba(148,163,184,0.22);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 18px 42px rgba(15,23,42,0.08);
        }

        .summary strong { color: var(--text); }
        .summary div { margin-bottom: 10px; }
        .summary div:last-child { margin-bottom: 0; }

        .warning { color: #b45309; font-weight: 700; }
        .small { font-size: 0.95rem; color: var(--muted); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Chia bảng giải cầu lông nội bộ
            CLB - Lên trình thì đổi tên</h1>
        <p class="small">Nhập tên và thuộc tính của mỗi người, sau đó bấm <strong>Chia nhóm</strong>. Hệ thống sẽ cố gắng cân bằng số lượng nam/nữ và hạt giống/thường giữa 2 đội.</p>
        <div class="flex-row">
            <button id="addPersonBtn">Thêm người mới</button>
            <button class="secondary" id="clearBtn">Xóa hết</button>
            <button class="secondary" id="sampleBtn">Mẫu nhanh</button>
        </div>
        <table id="peopleTable">
            <thead>
                <tr>
                    <th>Tên</th>
                    <th>Giới tính</th>
                    <th>Hạt giống</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button style="margin-top: 16px;" id="splitBtn">Chia nhóm</button>
    </div>

    <div class="card" id="outputCard" style="display:none;">
        <h2>Kết quả</h2>
        <div class="summary" id="summary"></div>
        <div class="result-grid">
            <div>
                <h3>Nhóm A</h3>
                <div id="teamA"></div>
            </div>
            <div>
                <h3>Nhóm B</h3>
                <div id="teamB"></div>
            </div>
        </div>
    </div>

    <script>
        const peopleTable = document.querySelector('#peopleTable tbody');
        const outputCard = document.querySelector('#outputCard');
        const summaryEl = document.querySelector('#summary');
        const teamAEl = document.querySelector('#teamA');
        const teamBEl = document.querySelector('#teamB');

        const categories = {
            gender: ['Nam', 'Nữ'],
            seed: ['Hạt giống', 'Thường']
        };

        const defaultNames = ['Tuấn', 'Thìn', 'Uy', 'Trâm', 'Trinh', 'Trang', 'Ngọc', 'Hoài', 'Đức', 'Hoàng', 'Kiên', 'Quyên'];

        function createPersonRow(name = '', gender = 'Nam', seed = 'Hạt giống') {
            const tr = document.createElement('tr');

            const nameTd = document.createElement('td');
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.value = name;
            nameInput.placeholder = 'Tên';
            nameTd.appendChild(nameInput);

            const genderTd = document.createElement('td');
            const genderSelect = document.createElement('select');
            categories.gender.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                if (value === gender) option.selected = true;
                genderSelect.appendChild(option);
            });
            genderTd.appendChild(genderSelect);

            const seedTd = document.createElement('td');
            const seedSelect = document.createElement('select');
            categories.seed.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                if (value === seed) option.selected = true;
                seedSelect.appendChild(option);
            });
            seedTd.appendChild(seedSelect);

            const removeTd = document.createElement('td');
            const removeBtn = document.createElement('button');
            removeBtn.textContent = 'Xóa';
            removeBtn.type = 'button';
            removeBtn.style.background = '#dc2626';
            removeBtn.onclick = () => tr.remove();
            removeTd.appendChild(removeBtn);

            tr.appendChild(nameTd);
            tr.appendChild(genderTd);
            tr.appendChild(seedTd);
            tr.appendChild(removeTd);

            peopleTable.appendChild(tr);
        }

        function getPeople() {
            return Array.from(peopleTable.querySelectorAll('tr')).map(row => {
                const inputs = row.querySelectorAll('input, select');
                return {
                    name: inputs[0].value.trim() || 'Không tên',
                    gender: inputs[1].value,
                    seed: inputs[2].value
                };
            }).filter(p => p.name.length > 0);
        }

        function hasEvenTypeCounts(people) {
            const totals = buildCounts(people);
            for (const g of categories.gender) {
                if ((totals.gender[g] || 0) % 2 !== 0) return false;
            }
            for (const s of categories.seed) {
                if ((totals.seed[s] || 0) % 2 !== 0) return false;
            }
            return true;
        }

        function randomChoice(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function buildCounts(list) {
            return list.reduce((acc, item) => {
                acc.total += 1;
                acc.gender[item.gender] = (acc.gender[item.gender] || 0) + 1;
                acc.seed[item.seed] = (acc.seed[item.seed] || 0) + 1;
                return acc;
            }, { total: 0, gender: {}, seed: {} });
        }

        function scoreAssignment(teamA, teamB, totals) {
            const teamACounts = buildCounts(teamA);
            const teamBCounts = buildCounts(teamB);
            const targets = {
                teamSize: totals.total / 2,
                gender: {},
                seed: {}
            };
            for (const g of categories.gender) {
                targets.gender[g] = (totals.gender[g] || 0) / 2;
            }
            for (const s of categories.seed) {
                targets.seed[s] = (totals.seed[s] || 0) / 2;
            }

            let score = 0;
            score += Math.abs(teamACounts.total - targets.teamSize) * 2;
            for (const g of categories.gender) {
                score += Math.abs((teamACounts.gender[g] || 0) - targets.gender[g]) * 3;
            }
            for (const s of categories.seed) {
                score += Math.abs((teamACounts.seed[s] || 0) - targets.seed[s]) * 3;
            }
            score += Math.abs(teamACounts.total - teamBCounts.total) * 4;
            return score;
        }

        function generateBestSplit(people) {
            const totals = buildCounts(people);
            let best = null;
            let bestScore = Infinity;
            const iterations = 5000;

            for (let i = 0; i < iterations; i++) {
                const shuffled = [...people].sort(() => Math.random() - 0.5);
                const teamA = [];
                const teamB = [];
                for (const person of shuffled) {
                    const teamScores = [
                        scoreAssignment([...teamA, person], teamB, totals),
                        scoreAssignment(teamA, [...teamB, person], totals)
                    ];
                    if (teamScores[0] < teamScores[1]) {
                        teamA.push(person);
                    } else if (teamScores[1] < teamScores[0]) {
                        teamB.push(person);
                    } else {
                        if (teamA.length <= teamB.length) teamA.push(person);
                        else teamB.push(person);
                    }
                }
                const score = scoreAssignment(teamA, teamB, totals);
                if (score < bestScore) {
                    bestScore = score;
                    best = { teamA, teamB, totals };
                    if (score === 0) break;
                }
            }
            return best;
        }

        function renderGroup(title, team, totals, teamClass) {
            const wrapper = document.createElement('div');
            wrapper.className = `result-card ${teamClass}`;
            const heading = document.createElement('div');
            heading.innerHTML = `<h3>${title} (${team.length})</h3>`;
            wrapper.appendChild(heading);
            const counts = buildCounts(team);
            const countInfo = document.createElement('div');
            countInfo.className = 'small';
            countInfo.innerHTML = `Nam: ${counts.gender['Nam'] || 0}, Nữ: ${counts.gender['Nữ'] || 0}, Hạt giống: ${counts.seed['Hạt giống'] || 0}, Thường: ${counts.seed['Thường'] || 0}`;
            wrapper.appendChild(countInfo);
            const pill = document.createElement('div');
            pill.className = `team-pill ${teamClass}`;
            pill.textContent = teamClass === 'team-a' ? 'Đội A' : 'Đội B';
            wrapper.appendChild(pill);
            const list = document.createElement('ul');
            list.style.paddingInlineStart = '0';
            for (const person of team) {
                const item = document.createElement('li');
                item.innerHTML = `<span class="badge">${person.gender}</span><span class="badge">${person.seed}</span><span>${person.name}</span>`;
                list.appendChild(item);
            }
            wrapper.appendChild(list);
            return wrapper;
        }

        function renderSummary(teamA, teamB, totals) {
            const diff = buildCounts(teamA);
            const diffB = buildCounts(teamB);
            const lines = [];
            lines.push(`<strong>Tổng cộng:</strong> ${totals.total} người`);
            lines.push(`Nhóm A: ${teamA.length}, Nhóm B: ${teamB.length}`);
            lines.push(`Nam A/B: ${(diff.gender['Nam'] || 0)}/${(diffB.gender['Nam'] || 0)}, Nữ A/B: ${(diff.gender['Nữ'] || 0)}/${(diffB.gender['Nữ'] || 0)}`);
            lines.push(`Hạt giống A/B: ${(diff.seed['Hạt giống'] || 0)}/${(diffB.seed['Hạt giống'] || 0)}, Thường A/B: ${(diff.seed['Thường'] || 0)}/${(diffB.seed['Thường'] || 0)}`);
            summaryEl.innerHTML = lines.map(line => `<div>${line}</div>`).join('');
            if (Math.abs(teamA.length - teamB.length) > 1) {
                const warning = document.createElement('div');
                warning.className = 'warning';
                warning.textContent = 'Kết quả không thể hoàn toàn cân bằng về số lượng do tổng số người là số lẻ hoặc phân phối thuộc tính không đều.';
                summaryEl.appendChild(warning);
            }
        }

        function splitPeople() {
            const people = getPeople();
            if (people.length < 2) {
                alert('Vui lòng nhập ít nhất 2 người.');
                return;
            }
            if (people.length % 2 !== 0) {
                alert('Vui lòng nhập số lượng thành viên chẵn để chia nhóm cân bằng.');
                return;
            }
            if (!hasEvenTypeCounts(people)) {
                alert('Vui lòng đảm bảo mỗi loại đều có số lượng chẵn: Nam, Nữ, Hạt giống, Thường.');
                return;
            }
            const result = generateBestSplit(people);
            if (!result) {
                alert('Không thể chia nhóm.');
                return;
            }
            teamAEl.innerHTML = '';
            teamBEl.innerHTML = '';
            teamAEl.appendChild(renderGroup('Đội A', result.teamA, result.totals, 'team-a'));
            teamBEl.appendChild(renderGroup('Đội B', result.teamB, result.totals, 'team-b'));
            renderSummary(result.teamA, result.teamB, result.totals);
            outputCard.style.display = 'block';
        }

        document.querySelector('#addPersonBtn').addEventListener('click', () => createPersonRow());
        document.querySelector('#clearBtn').addEventListener('click', () => {
            peopleTable.innerHTML = '';
            outputCard.style.display = 'none';
        });
        document.querySelector('#splitBtn').addEventListener('click', splitPeople);
        document.querySelector('#sampleBtn').addEventListener('click', () => {
            peopleTable.innerHTML = '';
            defaultNames.forEach((name, index) => {
                const gender = index % 2 === 0 ? 'Nam' : 'Nữ';
                const seed = index % 3 === 0 ? 'Hạt giống' : 'Thường';
                createPersonRow(name, gender, seed);
            });
            outputCard.style.display = 'none';
        });

        createPersonRow(defaultNames[0], 'Nam', 'Hạt giống');
        createPersonRow(defaultNames[1], 'Nam', 'Thường');
        createPersonRow(defaultNames[2], 'Nữ', 'Thường');
    </script>
</body>
</html>
